version: "3.9"

services:
  postgres:
    image: docker.io/postgres:17
    container_name: dev-postgres
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
      POSTGRES_DB: perch_mount
    ports:
      - "5432:5432"
    volumes:
      # - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      bash -c "apt-get update && apt-get install -y postgresql-17-cron && docker-entrypoint.sh postgres"
    restart: always
