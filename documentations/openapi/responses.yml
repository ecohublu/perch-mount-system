MemberResponse:
  description: get a member
  content:
    application/json:
      schema:
        $ref: "./schemas.yml#/Member"

MembersResponse:
  description: get member list
  content:
    application/json:
      schema:
        type: object
        properties:
          members:
            type: array
            items:
              $ref: "./schemas.yml#/Member"

PerchMountsResponse:
  description: get perch mount list
  content:
    application/json:
      schema:
        type: object
        properties:
          perch_mounts:
            type: array
            items:
              $ref: "./schemas.yml#/PerchMount"

PerchMountResponse:
  description: get a perch mount
  content:
    application/json:
      schema:
        $ref: "./schemas.yml#/PerchMount"

ProjectsResponse:
  description: get project list
  content:
    application/json:
      schema:
        type: object
        properties:
          projects:
            type: array
            items:
              $ref: "./schemas.yml#/Project"

ProjectResponse:
  description: get a project
  content:
    application/json:
      schema:
        $ref: "./schemas.yml#/Project"

SectionsResponse:
  description: get section list
  content:
    application/json:
      schema:
        type: object
        properties:
          sections:
            type: array
            items:
              $ref: "./schemas.yml#/Section"

SectionResponse:
  description: get section list
  content:
    application/json:
      schema:
        $ref: "./schemas.yml#/Section"

MediaResponse:
  description: get media list
  content:
    application/json:
      schema:
        type: object
        properties:
          media:
            type: array
            items:
              oneOf:
                - $ref: "./schemas.yml#/UndetectedMedium"
                - $ref: "./schemas.yml#/UnckechedMedium"
                - $ref: "./schemas.yml#/UnreviewedMedium"
                - $ref: "./schemas.yml#/ReviewedMedium"

MediumResponse:
  description: get a medium
  content:
    application/json:
      schema:
        oneOf:
          - $ref: "./schemas.yml#/UndetectedMedium"
          - $ref: "./schemas.yml#/UnckechedMedium"
          - $ref: "./schemas.yml#/UnreviewedMedium"
          - $ref: "./schemas.yml#/ReviewedMedium"

MeidumPostResponse:
  description: message response
  content:
    application/json:
      schema:
        properties:
          message:
            type: string
            example: successed

IndividualResponse:
  description: get a reviewed individual
  content:
    application/json:
      schema:
        oneOf:
          - $ref: "./schemas.yml#/UnreviewedIndividual"
          - $ref: "./schemas.yml#/ReviewedIndividual"

PostNewDataResponse:
  description: new data
  content:
    application/json:
      schema:
        type: object
        properties:
          section:
            $ref: "./schemas.yml#/Section"
          number_of_media:
            type: integer
            minimum: 0

BehaviorResponse:
  description: get a behavior
  content:
    application/json:
      schema:
        $ref: "./schemas.yml#/Behavior"

BehaviorsResponse:
  description: get behavior list
  content:
    application/json:
      schema:
        type: array
        items:
          $ref: "./schemas.yml#/Behavior"

CameraResponse:
  description: get a camera
