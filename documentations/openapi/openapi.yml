openapi: "3.0.0"
info:
  title: Perch Mount API
  version: "1.0"
servers:
  - url: https://api.server.test/v1

paths:
  /members:
    get:
      tags:
        - Member
      parameters:
        - $ref: "#/components/parameters/MemberPositionIDsQuery"
      responses:
        "200":
          $ref: "#/components/responses/MembersResponse"
    post:
      tags:
        - Member
      responses:
        "200":
          $ref: "#/components/responses/MemberResponse"

  /members/{MemberID}:
    get:
      tags:
        - Member
      parameters:
        - $ref: "#/components/parameters/MemberIDPathParam"
      responses:
        "200":
          $ref: "#/components/responses/MemberResponse"
    patch:
      tags:
        - Member
      responses:
        "200":
          $ref: "#/components/responses/MemberResponse"

  /projects:
    get:
      tags:
        - Project
      responses:
        "200":
          $ref: "#/components/responses/ProjectsResponse"

  /perch_mounts:
    get:
      tags:
        - Perch Mount
      parameters:
        - $ref: "#/components/parameters/ProjectIDsQuery"
        - $ref: "#/components/parameters/ClaimByIDsQuery"
        - $ref: "#/components/parameters/HabitatIDsQuery"
        - $ref: "#/components/parameters/PerchMountTerminatedQuery"
      responses:
        "200":
          $ref: "#/components/responses/PerchMountsResponse"

    post:
      tags:
        - Perch Mount
      responses:
        "200":
          $ref: "#/components/responses/PerchMountResponse"

  /perch_mounts/{PerchMountID}:
    get:
      tags:
        - Perch Mount
      parameters:
        - $ref: "#/components/parameters/PerchMountIDPathParam"
      responses:
        "200":
          $ref: "#/components/responses/PerchMountResponse"
    patch:
      tags:
        - Perch Mount
      responses:
        "200":
          $ref: "#/components/responses/PerchMountResponse"

  /sections:
    get:
      tags:
        - Section
      parameters:
        - $ref: "#/components/parameters/PerchMountIDsQuery"
        - $ref: "#/components/parameters/SectionSwappedDateFromQuery"
        - $ref: "#/components/parameters/SectionSwappedDateToQuery"
        - $ref: "#/components/parameters/SectionSwapperIDsQuery"
      responses:
        "200":
          $ref: "#/components/responses/SectionsResponse"
    post:
      tags:
        - Section
      responses:
        "200":
          $ref: "#/components/responses/SectionResponse"

  /sections/{SectionID}:
    get:
      tags:
        - Section
      parameters:
        - $ref: "#/components/parameters/SectionIDPathParam"
      responses:
        "200":
          $ref: "#/components/responses/SectionResponse"

    patch:
      tags:
        - Section
      responses:
        "200":
          $ref: "#/components/responses/SectionResponse"

  /media:
    get:
      tags:
        - Media
      parameters:
        - $ref: "#/components/parameters/PerchMountIDsQuery"
        - $ref: "#/components/parameters/SectionIDsQuery"
        - $ref: "#/components/parameters/MediaStatusQuery"
        - $ref: "#/components/parameters/OffsetQuery"
        - $ref: "#/components/parameters/LimitQuery"

      responses:
        "200":
          $ref: "#/components/responses/MediaResponse"

  /media/{MediumID}:
    get:
      tags:
        - Media
      parameters:
        - $ref: "#/components/parameters/MediumIDPathParam"
      responses:
        "200":
          $ref: "#/components/responses/MediumResponse"

    patch:
      tags:
        - Media
      parameters:
        - $ref: "#/components/parameters/MediumIDPathParam"
      responses:
        "200":
          $ref: "#/components/responses/MediumResponse"

  /unchecked_media:
    post:
      tags:
        - Media
      responses:
        "200":
          description: OK

  /detected_media:
    post:
      tags:
        - Media
      responses:
        "200":
          description: OK

  /reviewed_media:
    post:
      tags:
        - Media
      responses:
        "200":
          description: OKxx

  /accidental_media:
    post:
      tags:
        - Media
      responses:
        "200":
          description: OK

  /individuals:
    get:
      tags:
        - Individuals
      parameters:
        - $ref: "#/components/parameters/IndividualsPreyStatusQuery"
      responses:
        "200":
          description: OK

  /individuals/{IndividualID}:
    get:
      tags:
        - Individuals
      parameters:
        - $ref: "#/components/parameters/IndividualIDPathParam"
      responses:
        "200":
          description: OK

    patch:
      tags:
        - Individuals
      parameters:
        - $ref: "#/components/parameters/IndividualIDPathParam"
      responses:
        "200":
          description: OK

  /individuals/identified_preys:
    post:
      tags:
        - Individuals
      responses:
        "200":
          description: OK

  /behaviors:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK
    post:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /positions:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /habitats:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /cameras:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK
    post:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /events:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK
    post:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /mount_types:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK
    post:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /mount_layers:
    get:
      tags:
        - Options
      responses:
        "200":
          description: OK
    post:
      tags:
        - Options
      responses:
        "200":
          description: OK

  /species:
    get:
      tags:
        - species
      parameters:
        - $ref: "#/components/parameters/SpeciesChineseNameSearchQuery"
        - $ref: "#/components/parameters/SpeciesEndemismQuery"
        - $ref: "#/components/parameters/SpeciesEnglishNameSearchQuery"
        - $ref: "#/components/parameters/SpeciesFamilyQuery"
        - $ref: "#/components/parameters/SpeciesNameSearchQuery"
        - $ref: "#/components/parameters/SpeciesOrderQuery"
        - $ref: "#/components/parameters/SpeciesScientificNameSearchQuery"
      responses:
        "200":
          description: OK

  /species/{TaxonOrder}:
    get:
      tags:
        - species
      parameters:
        - $ref: "#/components/parameters/SpeciesTaxonOrderPathParam"
      responses:
        "200":
          description: OK

components:
  responses:
    MemberResponse:
      description: get a member
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Member"

    MembersResponse:
      description: get member list
      content:
        application/json:
          schema:
            type: object
            properties:
              members:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

    PerchMountsResponse:
      description: get perch mount list
      content:
        application/json:
          schema:
            type: object
            properties:
              perch_mounts:
                type: array
                items:
                  $ref: "#/components/schemas/PerchMount"

    PerchMountResponse:
      description: get a perch mount
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerchMount"

    ProjectsResponse:
      description: get project list
      content:
        application/json:
          schema:
            type: object
            properties:
              projects:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    SectionsResponse:
      description: get section list
      content:
        application/json:
          schema:
            type: object
            properties:
              projects:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

    SectionResponse:
      description: get section list
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Section"

    MediaResponse:
      description: get media list
      content:
        application/json:
          schema:
            type: object
            properties:
              media:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/UndetectedMedium"
                    - $ref: "#/components/schemas/EmptyMedium"
                    - $ref: "#/components/schemas/DetectedMedium"
                    - $ref: "#/components/schemas/ReviewedMedium"

    MediumResponse:
      description: get a medium
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/UndetectedMedium"
              - $ref: "#/components/schemas/EmptyMedium"
              - $ref: "#/components/schemas/DetectedMedium"
              - $ref: "#/components/schemas/ReviewedMedium"

  parameters:
    $ref: "./parameters.yml"

  schemas:
    $ref: "./schemas.yml"
