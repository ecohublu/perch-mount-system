    - natural
    - artificial
    - solar_panel
PerchMountLayers:
  type: string
  enum:
    - high
    - middle
    - low
MemberPositions:
  type: string
  enum:
    - professor
    - postdoc
    - doctor
    - master
    - undergrad
    - assistant
    - part_time
PreyIdentifiedStatus:
  type: string
  enum:
    - unchecked
    - inidentified
    - identified
TagStatus:
  type: string
  enum:
    - unchecked
    - ring
    - tagged
    - number_assigned
ConservationStatus:
  type: string
  enum:
    - I
    - II
    - III

MediaType:
  type: string
  enum:
    - image
    - video

Member:
  type: object
  properties:
    id:
