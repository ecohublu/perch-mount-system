DetectedIndividual:
  type: object
  properties:
    id:
      type: string
      format: uuid
    medium_id:
      type: string
      format: uuid
    taxon_order_by_ai:
      type: integer
    xmin:
      type: number
      format: float
      maximum: 1
      minimum: 0
    ymin:
      type: number
      format: float
      maximum: 1
      minimum: 0
    xmax:
      type: number
      format: float
      maximum: 1
      minimum: 0
    ymax:
      type: number
      format: float
      maximum: 1
      minimum: 0

ReviewedIndividuals:
  type: object
